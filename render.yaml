services:
  - type: web
    name: queenkoba-backend
    env: python
    buildCommand: pip install -r app/requirements.txt
    startCommand: gunicorn queenkoba_postgresql:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: queenkoba-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        value: 445338583811-0gknu3ni8fn9mh3pa874agtu61i29tvr.apps.googleusercontent.com

databases:
  - name: queenkoba-db
    databaseName: queenkoba
    user: queenkoba
